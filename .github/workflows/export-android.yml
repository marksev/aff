name: Export Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.1"
  GODOT_RELEASE: "stable"
  EXPORT_NAME: "BlockBlast"
  ANDROID_BUILD_TOOLS: "34.0.0"
  ANDROID_COMPILE_SDK: "34"

jobs:
  export-android:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "11076708"

      - name: Install Android build tools and platform
        run: |
          sdkmanager \
            "platforms;android-${ANDROID_COMPILE_SDK}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "platform-tools"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Godot ${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}
        run: |
          GODOT_FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${GODOT_FILENAME}.zip" \
            -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/${GODOT_FILENAME}" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install Godot Android export templates
        run: |
          TEMPLATES_FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${TEMPLATES_FILENAME}" \
            -O /tmp/templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Configure Godot Android settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/java_sdk_path = "$JAVA_HOME"
          EOF

      - name: Create Android export output directory
        run: mkdir -p build/android

      - name: Export Android APK (debug)
        run: |
          godot --headless --export-debug "Android" "build/android/${EXPORT_NAME}.apk"

      - name: Verify APK was created
        run: |
          if [ ! -f "build/android/${EXPORT_NAME}.apk" ]; then
            echo "ERROR: APK not found at build/android/${EXPORT_NAME}.apk"
            ls -la build/android/ || true
            exit 1
          fi
          echo "APK size: $(du -sh build/android/${EXPORT_NAME}.apk | cut -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlockBlast-APK
          path: build/android/${{ env.EXPORT_NAME }}.apk
          retention-days: 30
